<main class="container">
  <section class="row">
    <article class="col-12">
      <h3>Senators</h3>
    </article>
    <article class="col">
      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z8 ballotcontent-table"
      >
        <!-- Candidate No. Column -->
        <ng-container matColumnDef="candidate_no">
          <th mat-header-cell *matHeaderCellDef>No.</th>
          <td mat-cell *matCellDef="let element">{{ element.candidate_no }}</td>
        </ng-container>

        <!-- Candidate Name Column -->
        <ng-container matColumnDef="candidate_name">
          <th mat-header-cell *matHeaderCellDef>Candidate Name</th>
          <td mat-cell *matCellDef="let element">
            {{ element.candidate_name }}
          </td>
        </ng-container>

        <!-- Candidate Party Column -->
        <ng-container matColumnDef="candidate_party">
          <th mat-header-cell *matHeaderCellDef>Party</th>
          <td mat-cell *matCellDef="let element">
            {{ element.candidate_party }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </article>
  </section>
</main>
